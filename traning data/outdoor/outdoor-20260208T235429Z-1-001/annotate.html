<div id="openVideoBar" style="padding:8px 14px;background:#f5f5f5;border-bottom:1px solid #ccc;display:flex;align-items:center;gap:12px;font-size:16px;">
  <button id="btnOpenVideo" style="padding:7px 20px;background:#36a;color:#fff;border:none;border-radius:5px;cursor:pointer;font-size:16px;font-weight:bold;">Open Video</button>
  <span id="loadStatus" style="color:#555;font-size:15px;"></span>
</div>
<script>
(function(){
  var btn=document.getElementById("btnOpenVideo");
  var st=document.getElementById("loadStatus");
  if(!btn) return;
  btn.addEventListener("click",function(e){
    e.stopPropagation();
    btn.disabled=true; st.textContent="Opening file picker...";
    fetch("/open_file_dialog")
    .then(function(r){return r.json();})
    .then(function(res){
      var p=res.path; if(!p){btn.disabled=false;st.textContent="Cancelled.";return;}
      st.textContent="Loading "+p.split(/[\\/]/).pop()+"...";
      return fetch("/load_video",{method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({path:p})})
      .then(function(r){return r.json();})
      .then(function(resp){
        btn.disabled=false;
        if(!resp.ok){st.textContent="Error: "+(resp.error||"?");return;}
        var d=resp.data;
        D=d; t0=0; t1=D.duration;
        calibrationShots=(D.calibration_shots||[]).slice();
        calibrationBeepTimes=(D.beep_times||[]).slice();
        if(vid){vid.src="/video?"+Date.now();vid.load();
          vid.playbackRate=0.5;playheadT=0;
        }
        draw();
        if(window._updateSavePathDisplay) window._updateSavePathDisplay();
        st.textContent="Loaded: "+(d.video_base_name||p.split(/[\\/]/).pop());
      });
    })
    .catch(function(e){btn.disabled=false;st.textContent="Error: "+e;});
  });
})();
</script>

  if(o!==null){ var vst=(D.video_start_time!=null?D.video_start_time:0); vid.currentTime=o+vst; if(typeof playheadT !== 'undefined') playheadT=o+vst; if(timeStr) timeStr.textContent=vid.currentTime.toFixed(2)+' / '+(vid.duration||0).toFixed(2)+' s'; draw(); }
  return;
 }
 if(dragLineIndex>=0){
  var rect=c.getBoundingClientRect();
  var rx=e.clientX-rect.left;
  var t=xToTime(rx);
  if(t!==null){ calibrationShots[dragLineIndex]=t; draw(); }
  return;
 }
 if(dragBeepIndex>=0){
  var rect=c.getBoundingClientRect();
  var rx=e.clientX-rect.left;
  var t=xToTime(rx);
  if(t!==null){ calibrationBeepTimes[dragBeepIndex]=t; calibrationBeepTimes.sort(function(a,b){ return a-b; }); draw(); }
  return;
 }
 if(!drag) return;
 var rect=c.getBoundingClientRect();
 var rx=e.clientX-rect.left;
 if(dragSeek && typeof vid !== 'undefined' && vid){
  var o=xToTime(rx); if(o!==null){ var vst=(D.video_start_time!=null?D.video_start_time:0); vid.currentTime=o+vst; if(typeof playheadT !== 'undefined') playheadT=o+vst; if(timeStr) timeStr.textContent=vid.currentTime.toFixed(2)+' / '+(vid.duration||0).toFixed(2)+' s'; draw(); }
 } else {
  var dt=t1-t0, dx=(e.clientX-lastX)/c.width*dt;
  lastX=e.clientX;
  t0=clamp(t0-dx,0,D.duration-dt);
  t1=t0+dt;
  draw();
 }
});
wrap.addEventListener('mouseup',function(e){
 if(e.button!==0) return;
 if(dragPlayhead && vid && c){
  var rect=c.getBoundingClientRect();
  var rx=e.clientX-rect.left;
  var o=xToTime(rx);
  if(o!==null){ var vst=(D.video_start_time!=null?D.video_start_time:0); vid.currentTime=o+vst; if(typeof playheadT !== 'undefined') playheadT=o+vst; if(timeStr) timeStr.textContent=vid.currentTime.toFixed(2)+' / '+(vid.duration||0).toFixed(2)+' s'; vid.play(); if(btnPlay) btnPlay.textContent='Pause'; draw(); }
  dragPlayhead=0;
  return;
 }
 if(dragLineIndex>=0){ dragLineIndex=-1; drag=0; return; }
 if(dragBeepIndex>=0){ dragBeepIndex=-1; drag=0; return; }
 if(drag && typeof vid !== 'undefined' && vid && c){
  var rect=c.getBoundingClientRect();
  var rx=e.clientX-rect.left;
  var o=xToTime(rx);
  if(o!==null){ var vst=(D.video_start_time!=null?D.video_start_time:0); vid.currentTime=o+vst; if(typeof playheadT !== 'undefined') playheadT=o+vst; if(timeStr) timeStr.textContent=vid.currentTime.toFixed(2)+' / '+(vid.duration||0).toFixed(2)+' s'; if(btnPlay&&vid.paused){ vid.play(); btnPlay.textContent='Pause'; } draw(); }
 }
 drag=0; dragSeek=0;
});
wrap.addEventListener('mouseleave',function(){ dragLineIndex=-1; dragBeepIndex=-1; dragPlayhead=0; drag=0; dragSeek=0; });
wrap.addEventListener('contextmenu',function(e){
 e.preventDefault();
 var rect=c.getBoundingClientRect();
 var rx=e.clientX-rect.left;
 var plotW=c.width-2*pad;
 if(plotW<1 || rx<pad || rx>pad+plotW) return;
 if(e.ctrlKey){
  var beepIdx=hitTestBeep(rx);
  if(beepIdx>=0){ calibrationBeepTimes.splice(beepIdx,1); draw(); return; }
  var t=xToTime(rx);
  if(t!==null){ calibrationBeepTimes.push(t); calibrationBeepTimes.sort(function(a,b){ return a-b; }); draw(); }
  return;
 }
 var idx=hitTestLine(rx);
 if(idx>=0){ calibrationShots.splice(idx,1); draw(); return; }
 var t=xToTime(rx);
 if(t!==null){ calibrationShots.push(t); calibrationShots.sort(function(a,b){ return a-b; }); draw(); }
});
var btnSaveEl = document.getElementById('btnSave');
btnSaveEl.addEventListener('mousedown',function(e){ e.stopPropagation(); });
btnSaveEl.addEventListener('mouseup',function(e){ e.stopPropagation(); });
btnSaveEl.addEventListener('click',function(e){
 e.preventDefault();
 e.stopPropagation();
 var sorted = calibrationShots.slice().sort(function(a,b){ return a-b; });
 if(sorted.length===0){ alert('没有枪声时刻'); return; }
 var text = sorted.map(function(t){ return parseFloat(t.toFixed(4)); }).map(function(x){ return x.toFixed(4); }).join('\n');
 if(D.calibration_save_path && location.protocol==='http:'){
  fetch('/save_calibration', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ path: D.calibration_save_path, content: text }) })
   .then(function(r){ return r.json(); })
   .then(function(o){ if(o.ok) document.getElementById('saveDirHint').textContent='已保存到: '+o.path; else alert('保存失败: '+(o.error||'')); })
   .catch(function(e){ alert('保存失败: '+e); });
  return;
 }
 if(D.calibration_http_url){ window.open(D.calibration_http_url); alert('当前为直接打开文件，无法写入视频目录。已在新标签页打开校准页，请在新页面中点击「保存校准」即可写入视频目录。本页将同时下载一份到您的下载文件夹。'); }
 var blob = new Blob([text], { type: 'text/plain;charset=utf-8' });
 var a = document.createElement('a');
 a.href = URL.createObjectURL(blob);
 a.download = (D.video_base_name || 'video') + 'cali.txt';
 a.click();
 URL.revokeObjectURL(a.href);
});

if(btnSaveBeepEl){ btnSaveBeepEl.addEventListener('mousedown',function(e){ e.stopPropagation(); }); btnSaveBeepEl.addEventListener('mouseup',function(e){ e.stopPropagation(); });
btnSaveBeepEl.addEventListener('click',function(e){
 e.preventDefault();
 e.stopPropagation();
 var sorted = calibrationBeepTimes.slice().sort(function(a,b){ return a-b; });
 if(sorted.length===0){ alert('没有 Beep 时刻'); return; }
 var text = sorted.map(function(t){ return parseFloat(t.toFixed(4)); }).map(function(x){ return x.toFixed(4); }).join('\n');
 if(D.calibration_beep_path && location.protocol==='http:'){
  fetch('/save_calibration', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ path: D.calibration_beep_path, content: text }) })
   .then(function(r){ return r.json(); })
   .then(function(o){ if(o.ok) document.getElementById('saveDirHint').textContent='Beep 已保存: '+o.path; else alert('保存失败: '+(o.error||'')); })
   .catch(function(e){ alert('保存失败: '+e); });
  return;
 }
 var base = (D.video_base_name || 'video'); var key = base.indexOf('-')>=0 ? base.split('-')[0] : base;
 var blob = new Blob([text], { type: 'text/plain;charset=utf-8' });
 var a = document.createElement('a');
 a.href = URL.createObjectURL(blob);

 a.click();

if(D.calibration_save_path && location.protocol==='http:') document.getElementById('saveDirHint').textContent='保存将写入视频目录: '+D.calibration_save_path;

<script>
(function(){
  // ---- Speed control ----
  window._setSpeed = function(s){
    if(vid){ vid.playbackRate=s; }
    ['spd025','spd050','spd100'].forEach(function(id){
      var b=document.getElementById(id);
      if(!b) return;
      var v=parseFloat(b.id.replace('spd',''))/100;
      // spd025=0.25, spd050=0.5, spd100=1.0
      var map={'spd025':0.25,'spd050':0.5,'spd100':1.0};
      if(map[id]===s){ b.style.outline='2px solid #2a7'; b.style.fontWeight='bold'; }
      else { b.style.outline=''; b.style.fontWeight=''; }
    });
  };

  // ---- Clone wrap to drop all existing mouse listeners ----
  var oldWrap = document.getElementById('wrap');
  var newWrap = oldWrap.cloneNode(true);
  oldWrap.parentNode.replaceChild(newWrap, oldWrap);
  // Re-bind globals that pointed at the old element
  wrap = newWrap;
  c    = document.getElementById('c');

  // ---- Re-attach wheel (zoom/pan) — same logic as original ----
  wrap.addEventListener('wheel', function(e){
    e.preventDefault();
    var rect=wrap.getBoundingClientRect();
    var plotW=c.width-2*pad;
    if(plotW<1) return;
    if(e.ctrlKey){
      var k=e.deltaY>0?0.85:1/0.85;
      var mx=e.clientX-rect.left;
      var frac=((mx-pad)/plotW)||0.5;
      frac=Math.max(0,Math.min(1,frac));
      var tmid=t0+(t1-t0)*frac;
      var dt=t1-t0;
      var dtNew=Math.max(D.duration/5000, Math.min(D.duration, dt*k));
      t0=Math.max(0,Math.min(D.duration-dtNew, tmid-dtNew/2));
      t1=t0+dtNew;
    } else {
      var dx=(e.deltaY||e.deltaX)*0.15*(t1-t0)/10;
      var dt=t1-t0;
      t0=Math.max(0,Math.min(D.duration-dt, t0+dx));
      t1=t0+dt;
    }
    draw();
  }, {passive:false});

  // ---- Enlarged playhead hit test (24px) ----
  function hitPlayhead(rx){
    var plotW=c.width-2*pad;
    if(plotW<1||!vid||typeof playheadT==='undefined') return false;
    var vst=D.video_start_time||0;
    var pt=playheadT-vst;
    if(pt<t0||pt>t1) return false;
    var px=pad+(pt-t0)/(t1-t0)*plotW;
    return Math.abs(rx-px)<=24;
  }
  function xToT(rx){
    var plotW=c.width-2*pad;
    if(rx<pad||rx>pad+plotW) return null;
    var t=t0+(rx-pad)/plotW*(t1-t0);
    return Math.max(0,Math.min(D.duration,t));
  }
  function seekAndPlay(t){
    if(!vid) return;
    var vst=D.video_start_time||0;
    vid.currentTime=t+vst;
    playheadT=t+vst;
    if(timeStr) timeStr.textContent=vid.currentTime.toFixed(2)+' / '+(vid.duration||0).toFixed(2)+' s';
    var p=vid.play();
    if(p && typeof p.catch==='function') p.catch(function(){
      // If interrupted (e.g. video not ready yet), retry once after seeked
      var onSeeked=function(){
        vid.removeEventListener('seeked',onSeeked);
        var p2=vid.play();
        if(p2 && typeof p2.catch==='function') p2.catch(function(){});
      };
      vid.addEventListener('seeked',onSeeked);
    });
    if(btnPlay) btnPlay.textContent='Pause';
    draw();
  }
  function seekOnly(t){
    var vst=D.video_start_time||0;
    vid.currentTime=t+vst;
    playheadT=t+vst;
    if(timeStr) timeStr.textContent=vid.currentTime.toFixed(2)+' / '+(vid.duration||0).toFixed(2)+' s';
    draw();
  }

  // ---- Mouse state ----
  var _mode=null;   // 'playhead'|'line'|'beep'|'pan'|null
  var _lineIdx=-1, _beepIdx=-1;
  var _startX=0, _moved=false;
  var THRESH=5;

  // ---- mousedown ----
  wrap.addEventListener('mousedown', function(e){
    if(e.button!==0) return;
    // Ignore clicks that originate inside the toolbar (buttons, etc.)
    var tb=document.getElementById('waveformToolbar');
    if(tb && tb.contains(e.target)) return;
    _startX=e.clientX; _moved=false;
    var rect=c.getBoundingClientRect();
    var rx=e.clientX-rect.left;
    if(vid && hitPlayhead(rx)){
      _mode='playhead'; return;
    }
    // hit test shot line
    var plotW=c.width-2*pad;
    if(plotW>0 && rx>=pad && rx<=pad+plotW){
      for(var i=0;i<calibrationShots.length;i++){
        var px=pad+(calibrationShots[i]-t0)/(t1-t0)*plotW;
        if(Math.abs(rx-px)<=6){ _mode='line'; _lineIdx=i; return; }
      }
      for(var i=0;i<calibrationBeepTimes.length;i++){
        var px=pad+(calibrationBeepTimes[i]-t0)/(t1-t0)*plotW;
        if(Math.abs(rx-px)<=6){ _mode='beep'; _beepIdx=i; return; }
      }
    }
    _mode='pan';
  });

  // ---- mousemove ----
  document.addEventListener('mousemove', function(e){
    if(!_mode) return;
    if(Math.abs(e.clientX-_startX)>THRESH) _moved=true;
    var rect=c.getBoundingClientRect();
    var rx=e.clientX-rect.left;

    if(_mode==='playhead' && vid){
      var t=xToT(rx); if(t!==null) seekOnly(t);
      return;
    }
    if(_mode==='line'){
      if(_moved){ var t=xToT(rx); if(t!==null){ calibrationShots[_lineIdx]=t; draw(); } }
      return;
    }
    if(_mode==='beep'){
      if(_moved){ var t=xToT(rx); if(t!==null){ calibrationBeepTimes[_beepIdx]=t; calibrationBeepTimes.sort(function(a,b){return a-b;}); draw(); } }
      return;
    }
    if(_mode==='pan' && _moved){
      var dt=t1-t0;
      var dx=(e.clientX-_startX)/Math.max(1,c.width)*dt;
      _startX=e.clientX;
      t0=Math.max(0,Math.min(D.duration-dt, t0-dx));
      t1=t0+dt;
      draw();
    }
  });

  // ---- mouseup ----
  document.addEventListener('mouseup', function(e){
    if(e.button!==0){ _mode=null; return; }
    var rect=c.getBoundingClientRect();
    var rx=e.clientX-rect.left;

    if(_mode==='playhead' && vid){
      // Release playhead → play from here
      var t=xToT(rx); if(t!==null) seekAndPlay(t);
    } else if(_mode==='line'){
      _lineIdx=-1;
    } else if(_mode==='beep'){
      _beepIdx=-1;
    } else if(_mode==='pan' && !_moved && vid){
      // Clean click on waveform → seek + play
      var t=xToT(rx); if(t!==null) seekAndPlay(t);
    }
    _mode=null;
  });

  // ---- mouseleave ----
  wrap.addEventListener('mouseleave', function(){
    if(_mode==='line') _lineIdx=-1;
    if(_mode==='beep') _beepIdx=-1;
    _mode=null;
  });

  // ---- Right-click: add/delete shot or beep (unchanged logic) ----
  wrap.addEventListener('contextmenu', function(e){
    e.preventDefault();
    var rect=c.getBoundingClientRect();
    var rx=e.clientX-rect.left;
    var plotW=c.width-2*pad;
    if(plotW<1||rx<pad||rx>pad+plotW) return;
    if(e.ctrlKey){
      // beep add/delete
      for(var i=0;i<calibrationBeepTimes.length;i++){
        var px=pad+(calibrationBeepTimes[i]-t0)/(t1-t0)*plotW;
        if(Math.abs(rx-px)<=10){ calibrationBeepTimes.splice(i,1); draw(); return; }
      }
      var t=xToT(rx); if(t!==null){ calibrationBeepTimes.push(t); calibrationBeepTimes.sort(function(a,b){return a-b;}); draw(); }
      return;
    }
    // shot add/delete
    for(var i=0;i<calibrationShots.length;i++){
      var px=pad+(calibrationShots[i]-t0)/(t1-t0)*plotW;
      if(Math.abs(rx-px)<=10){ calibrationShots.splice(i,1); draw(); return; }
    }
    var t=xToT(rx); if(t!==null){ calibrationShots.push(t); calibrationShots.sort(function(a,b){return a-b;}); draw(); }
  });

  // ---- Save All button (created after cloneNode so it keeps its listener) ----
  (function(){
    function showToast(msg, ok){
      var t=document.getElementById('saveToast');
      if(!t) return;
      t.textContent=msg;
      t.style.background=ok?'#2a7':'#c44';
      t.style.display='block';
      clearTimeout(t._tid);
      t._tid=setTimeout(function(){ t.style.display='none'; }, 3000);
    }
    window._showToast = showToast;

    function doSave(){
      var caliPath=D.calibration_save_path;
      var beepPath=D.calibration_beep_path;
      var shots=calibrationShots.slice().sort(function(a,b){return a-b;});
      var beeps=calibrationBeepTimes.slice().sort(function(a,b){return a-b;});
      var caliText=shots.map(function(t){return t.toFixed(4);}).join('\n');
      var beepText=beeps.map(function(t){return t.toFixed(4);}).join('\n');
      var saved=0, total=0;
      function done(ok,msg){ saved++; if(saved===total){ showToast(ok?'Saved!':('Error: '+msg), ok); } }
      if(caliPath){
        total++;
        fetch('/save_calibration',{method:'POST',headers:{'Content-Type':'application/json'},
          body:JSON.stringify({path:caliPath,content:caliText})})
        .then(function(r){return r.json();})
        .then(function(o){ done(o.ok, o.error||''); })
        .catch(function(e){ done(false,''+e); });
      }
      if(beepPath){
        total++;
        fetch('/save_calibration',{method:'POST',headers:{'Content-Type':'application/json'},
          body:JSON.stringify({path:beepPath,content:beepText})})
        .then(function(r){return r.json();})
        .then(function(o){ done(o.ok, o.error||''); })
        .catch(function(e){ done(false,''+e); });
      }
      if(total===0){ showToast('No save path set.', false); }
    }
    window._doSave = doSave;

    var toolbar=document.getElementById('waveformToolbar');
    if(toolbar){
      // Hide the original two save buttons (replaced by Save All)
      var bs=document.getElementById('btnSave');
      var bb=document.getElementById('btnSaveBeep');
      if(bs) bs.style.display='none';
      if(bb) bb.style.display='none';
      // Create Save All button
      var btnAll=document.createElement('button');
      btnAll.type='button';
      btnAll.textContent='Save All';
      btnAll.style.cssText='padding:10px 24px;background:#c75;color:#fff;border:none;border-radius:6px;cursor:pointer;font-size:17px;font-weight:bold;';
      btnAll.addEventListener('mousedown',function(e){e.stopPropagation();});
      btnAll.addEventListener('mouseup',  function(e){e.stopPropagation();});
      btnAll.addEventListener('click',function(e){
        e.preventDefault(); e.stopPropagation();
        var msg='Save annotations?\n'+
          (D.calibration_save_path?'  shots -> '+D.calibration_save_path+'\n':'')+
          (D.calibration_beep_path?'  beep  -> '+D.calibration_beep_path:'');
        if(!confirm(msg)) return;
        doSave();
      });
      toolbar.insertBefore(btnAll, toolbar.firstChild);

      // Save path display
      var pathDiv = document.createElement('div');
      pathDiv.id = 'savePathDisplay';
      pathDiv.style.cssText = 'font-size:13px;color:#555;margin-top:6px;word-break:break-all;';
      toolbar.appendChild(pathDiv);
    }

    // Show current save paths (call this after D is updated too)
    window._updateSavePathDisplay = function(){
      var el = document.getElementById('savePathDisplay');
      if(!el) return;
      var lines = [];
      if(D.calibration_save_path) lines.push('shots: ' + D.calibration_save_path);
      if(D.calibration_beep_path) lines.push('beep:  ' + D.calibration_beep_path);
      el.textContent = lines.join('   |   ');
    };
    window._updateSavePathDisplay();
  })();

  draw();
})();
</script>
